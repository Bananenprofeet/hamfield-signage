name: signage-platform

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: signage
      POSTGRES_PASSWORD: signage
      POSTGRES_DB: signage
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signage"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: signage
      MINIO_ROOT_PASSWORD: signage-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 signage signage-secret &&
      mc mb --ignore-existing local/signage-media &&
      echo 'MinIO bucket ready'
      "

  migrate:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    command: ["node", "packages/database/node_modules/prisma/build/index.js", "migrate", "deploy", "--schema", "packages/database/prisma/schema.prisma"]
    environment:
      DATABASE_URL: postgresql://signage:signage@postgres:5432/signage
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    environment:
      DATABASE_URL: postgresql://signage:signage@postgres:5432/signage
      REDIS_URL: redis://redis:6379
      API_HOST: 0.0.0.0
      API_PORT: 4000
      API_PUBLIC_URL: http://localhost:4000
      JWT_SECRET: dev-only-secret-do-not-use-in-production
      CORS_ORIGINS: http://localhost:5173,http://localhost:8081
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: http://localhost:9000
      S3_REGION: us-east-1
      S3_BUCKET: signage-media
      S3_ACCESS_KEY: signage
      S3_SECRET_KEY: signage-secret
      S3_FORCE_PATH_STYLE: "true"
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully

  worker:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    environment:
      DATABASE_URL: postgresql://signage:signage@postgres:5432/signage
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: http://localhost:9000
      S3_REGION: us-east-1
      S3_BUCKET: signage-media
      S3_ACCESS_KEY: signage
      S3_SECRET_KEY: signage-secret
      S3_FORCE_PATH_STYLE: "true"
      WORKER_CONCURRENCY: 2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api

  # Optional: a simulated signage device. Enable with: docker compose --profile mock-device up
  mock-device:
    build:
      context: .
      dockerfile: infra/docker/mock-device.Dockerfile
    profiles: ["mock-device"]
    environment:
      MOCK_DEVICE_BACKEND_URL: http://api:4000
      MOCK_DEVICE_PAIRING_CODE: ${MOCK_DEVICE_PAIRING_CODE:-}
      MOCK_DEVICE_PORT: 8080
    ports:
      - "8081:8080"
    depends_on:
      - api

volumes:
  postgres-data:
  redis-data:
  minio-data:
