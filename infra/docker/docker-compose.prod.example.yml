# ──────────────────────────────────────────────────────────────────────────────
#  Hamfield Signage — PRODUCTION override TEMPLATE
# ──────────────────────────────────────────────────────────────────────────────
#  Copy to the real (git-ignored) file and edit the marked values:
#
#      cp infra/docker/docker-compose.prod.example.yml \
#         infra/docker/docker-compose.prod.yml
#
#  This file layers on top of docker-compose.yml and is the SINGLE place that
#  holds production configuration & secrets:
#    - real database password + connection string,
#    - JWT secret, public URL, CORS origins,
#    - external object storage (Cloudflare R2) credentials,
#    - NODE_ENV=production, restart policies, no public host ports,
#    - a Caddy reverse proxy that terminates TLS for ONE domain
#      (dashboard + REST API + device WebSocket are all same-origin).
#
#  Run both files together (see docs/deployment.md):
#      docker compose -f docker-compose.yml \
#                     -f infra/docker/docker-compose.prod.yml up -d --build
#
#  NOTE: this production setup uses external object storage (R2), so the base
#  file's `minio` / `minio-setup` services should be removed (see that file).
#
#  Everything you MUST change is marked with  # ❗CHANGE
# ──────────────────────────────────────────────────────────────────────────────

# ── Edit these two anchors and you've configured almost everything ──────────────
# Database URL — reused by migrate/api/worker so the credentials can never drift.
x-database-url: &database-url postgresql://signage:CHANGE_ME_STRONG_DB_PASSWORD@postgres:5432/signage # ❗CHANGE the password (must equal POSTGRES_PASSWORD below)

# Cloudflare R2 credentials — reused by api and worker. ❗CHANGE all five.
#   - Account endpoint:  https://<ACCOUNT_ID>.r2.cloudflarestorage.com
#   - Access key / secret: created under R2 → "Manage R2 API Tokens"
#   - Region is literally "auto" for R2; path-style addressing is required.
x-r2-credentials: &r2-credentials
  S3_ENDPOINT: https://CHANGE_ME_ACCOUNT_ID.r2.cloudflarestorage.com # ❗CHANGE
  S3_REGION: auto
  S3_BUCKET: signage-media # ❗CHANGE if your R2 bucket has a different name
  S3_ACCESS_KEY: CHANGE_ME_R2_ACCESS_KEY_ID # ❗CHANGE
  S3_SECRET_KEY: CHANGE_ME_R2_SECRET_ACCESS_KEY # ❗CHANGE
  S3_FORCE_PATH_STYLE: "true"
# ────────────────────────────────────────────────────────────────────────────────

services:
  # NOTE: `!reset []` clears the host port published by the base file so it is
  # internal-only in production. It requires Docker Compose v2.24.4+. On older
  # Compose, instead delete the `ports:` mappings from your base docker-compose.yml.
  postgres:
    restart: unless-stopped
    ports: !reset [] # internal only
    environment:
      POSTGRES_PASSWORD: CHANGE_ME_STRONG_DB_PASSWORD # ❗CHANGE — must match the password in x-database-url

  redis:
    restart: unless-stopped
    ports: !reset [] # internal only

  migrate:
    environment:
      DATABASE_URL: *database-url

  api:
    restart: unless-stopped
    ports: !reset [] # reached only through caddy -> web -> api
    environment:
      <<: *r2-credentials
      NODE_ENV: production
      DATABASE_URL: *database-url
      # Public base URL of the dashboard + API. Must be HTTPS and match Caddyfile.
      API_PUBLIC_URL: https://app.example.com # ❗CHANGE
      CORS_ORIGINS: https://app.example.com # ❗CHANGE (your dashboard origin only)
      # Generate with:  openssl rand -hex 32
      JWT_SECRET: CHANGE_ME_OPENSSL_RAND_HEX_32 # ❗CHANGE
      # Browser-facing object-storage endpoint used inside presigned URLs.
      # For R2 this is the SAME account endpoint as S3_ENDPOINT above.
      S3_PUBLIC_ENDPOINT: https://CHANGE_ME_ACCOUNT_ID.r2.cloudflarestorage.com # ❗CHANGE
      MAX_UPLOAD_SIZE_BYTES: 1073741824
      # First-run superadmin (created once if none exists; min 12 chars).
      INITIAL_SUPERADMIN_EMAIL: admin@example.com # ❗CHANGE
      INITIAL_SUPERADMIN_PASSWORD: CHANGE_ME_STRONG_12+ # ❗CHANGE
      INITIAL_SUPERADMIN_NAME: Platform Admin # ❗CHANGE

  worker:
    restart: unless-stopped
    environment:
      <<: *r2-credentials
      NODE_ENV: production
      DATABASE_URL: *database-url
      WORKER_CONCURRENCY: 2

  web:
    restart: unless-stopped
    ports: !reset [] # reached only through caddy

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  caddy-data:
  caddy-config:
